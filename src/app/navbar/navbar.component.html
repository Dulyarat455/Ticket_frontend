<nav class="main-header navbar navbar-expand navbar-white navbar-light ticket-navbar">
  <!-- Left navbar links -->
  <ul class="navbar-nav navbar-left-area">
    <li class="nav-item">
      <a class="nav-link nav-menu-btn" data-widget="pushmenu" href="#" role="button">
        <i class="fas fa-bars"></i>
      </a>
    </li>

   
  </ul>

  <!-- Center / Brand Title -->
  <div class="ticket-nav-brand">
    <div class="ticket-nav-label">PRODUCTION SUPPORT</div>
    <div class="ticket-nav-title">Web Ticket Management</div>
  </div>

  <ul class="navbar-nav ticket-nav-menu">
    <li class="nav-item d-none d-sm-inline-block">
      <a
        [routerLink]="['/']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link nav-normal-link"
      >
        Home
      </a>
    </li>
  
    @if (!token || token.trim() === '') {
      <li class="nav-item d-none d-sm-inline-block">
        <a
          [routerLink]="['/signIn']"
          routerLinkActive="active"
          class="nav-link nav-normal-link"
        >
          SignIn
        </a>
      </li>
    }
  
    @if (token && token.trim().length > 0) {
      <li class="nav-item d-none d-sm-inline-block">
        <a
          [routerLink]="['/myTicket']"
          routerLinkActive="active"
          class="nav-link nav-normal-link"
        >
          MyTicket
        </a>
      </li>
    }
  </ul>

  <!-- Right navbar links -->
  <ul class="navbar-nav ml-auto navbar-right-area">
    <li class="nav-item d-none d-md-block">
      <span class="nav-link nav-datetime-pill">
        <i class="far fa-calendar-alt mr-1"></i>
        <span>{{ formattedDate }}</span>
      </span>
    </li>

    <li class="nav-item d-none d-md-block">
      <span class="nav-link nav-datetime-pill">
        <i class="far fa-clock mr-1"></i>
        <span>{{ formattedTime }}</span>
      </span>
    </li>

    <li class="nav-item">
      <a class="nav-link nav-icon-btn" data-widget="fullscreen" href="#" role="button">
        <i class="fas fa-expand-arrows-alt"></i>
      </a>
    </li>
  </ul>
</nav>
