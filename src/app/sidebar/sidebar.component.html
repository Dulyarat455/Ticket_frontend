<aside class="main-sidebar sidebar-dark-primary elevation-4">
  <!-- Brand Logo -->
  <a
    routerLink="/"
    class="brand-link d-flex align-items-center"
    style="text-decoration: none; padding: 1rem"
  >
    <img
      src="dist/img/help.png"
      alt="AdminLTE Logo"
      class="brand-image"
    />
    <span class="brand-text ms-2">
      <h5 class="mb-0">Ticket Press</h5>
    </span>
  </a>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- User Panel -->
    @if (name != undefined) {
    <div class="user-panel mt-3 pb-3 mb-3">
      <div class="d-flex align-items-center p-3 mb-3 bg-dark rounded">
        <div class="image">
          <img
            src="dist/img/employee.png"
            class="img-circle elevation-2"
            alt="User Image"
            style="width: 45px; height: 45px; object-fit: cover"
          />
        </div>
        <div class="info ms-3">
          <h5 class="text-white mb-1">{{ empNo }}</h5>
          <small class="text-light opacity-75">{{ level }}</small>
        </div>
      </div>
      <button class="btn btn-danger w-100" (click)="signout()">
        <i class="fas fa-sign-out-alt me-2"></i>Sign Out
      </button>
    </div>
    }

    <!-- Menu -->
    <nav class="mt-2">
      <ul
        class="nav nav-pills nav-sidebar flex-column"
        data-widget="treeview"
        role="menu"
        style="padding-bottom: 60px"
      >
        <!-- เพิ่ม padding-bottom -->
        <!-- Main Menu -->
        <li class="nav-item mb-1">
          <a routerLink="/" class="nav-link" routerLinkActive="active">
            <i class="nav-icon fas fa-home"></i>
            <p class="ms-2">หน้าหลัก</p>
          </a>
        </li>

        <!-- Inventory Menu -->
        <!-- @if (level == 'Admin') {} -->
        <li class="nav-item">
          <h6
            class="sidebar-heading d-flex justify-content-between align-items-center px-3 mb-1 text-light"

            <span><b>Data Master</b></span>
          </h6>
          <a href="#" class="nav-link">
            <i class="nav-icon fas fa-warehouse"></i>
            <p class="ms-2">
              Master
              <i class="fas fa-angle-right ms-auto"></i>
            </p>
          </a>
          <ul class="nav nav-treeview bg-dark bg-opacity-50 rounded mx-2 mt-1">
           
            <li class="nav-item">
              <a
                routerLink="/project"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="fas fa-warehouse nav-icon"></i>
                <p class="ms-2">Add Project</p>
              </a>
            </li>
            <li class="nav-item">
              <a
                routerLink="/machine-output"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="fas fa-chart-bar nav-icon"></i>
                <p class="ms-2">Add Impact</p>
              </a>
            </li>
          </ul>
        </li>

        <!-- Scrap Menu -->
        <li class="nav-item">
          <h6
            class="sidebar-heading d-flex justify-content-between align-items-center px-3 mb-1 text-light"

            <span><b>Report Views</b></span>
          </h6>
          <a href="#" class="nav-link">
            <i class="nav-icon fas fa-cart-arrow-down"></i>
            <p class="ms-2">
              Reports
              <i class="fas fa-angle-right ms-auto"></i>
            </p>
          </a>
          <ul class="nav nav-treeview bg-dark bg-opacity-50 rounded mx-2 mt-1">
            <li class="nav-item mb-1">
              <a
                routerLink="/dashboard"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="nav-icon fas fa-chart-line"></i>
                <p class="ms-2">Dashboard</p>
              </a>
            </li>

           
            <li class="nav-item mb-1">
              <a
                routerLink="/scrap-report"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="nav-icon fas fa-file-alt"></i>
                <p class="ms-2">Scrap Report</p>
              </a>
            </li>
          </ul>
        </li>
